<body class="sub">
	<div class="container-log">
		<div class="search-box" aria-label="방문자-검색">
			<div class="row">
				<div class="col-md-12 col-lg-auto mb-3">
					<span class="form-label">방문자 집계</span>
					<div class="row g-2 visitors">
						<div class="col-auto">
							<strong class="icon-groups">전체 </strong>
							<span class="visually-hidden">방문자수: </span>
							<span>1,325 명</span>
						</div>
						<div class="col-auto">
							<strong class="icon-month">2026-03</strong>
							<span>25 명</span>
						</div>
						<div class="col">
							<strong class="icon-person">오늘</strong>
							<span>48 명</span>
						</div>
					</div>
				</div>
				<div class="col-lg-1 mb-3"></div>
                <div class="col-md-auto col-xl-3 mb-3">
					<span class="form-label" id="searchPeriod">검색 기간</span>
					<div class="row g-2 period-box" aria-labelledby="searchPeriod">
						<div class="col">
							<label class="visually-hidden" for="txtSearchStartDate">시작일</label>
							<input type="date" class="form-control icon-calendar" name="searchStartDate" id="txtSearchStartDate">
						</div>
						<div class="col-auto">
							<span class="form-control-plaintext">~</span>
						</div>
						<div class="col">
							<label class="visually-hidden" for="txtSearchEndDate">종료일</label>
							<input type="date" class="form-control icon-calendar" name="searchEndDate" id="txtSearchEndDate">
						</div>
					</div>
				</div>

				<div class="col col-md-auto mb-3">
					<button type="button" class="btn btn-primary" onclick="fnLoadVisitList();">
						<span class="icon icon-search"></span>
						<span>검색</span>
					</button>
				</div>
			</div>
		</div>

		<div class="title-box" id="divSearchResult">
			<h4 class="title03">조회결과 <small id="searchResultCnt"></small></h4>
			<div class="btn-box">
				<button type="button" class="btn btn-primary" onclick="fnVisitExcelDownload()">
					<span>엑셀 다운로드</span>
				</button>
			</div>
		</div>

		<div class="table-responsive">
			<table class="table table-sm" aria-label="방문자정보">
				<thead>
				<tr>
					<th scope="col" name="excelCol" data-field="방문일">방문일</th>
					<th scope="col" name="excelCol" data-field="사번">사번</th>
					<th scope="col" name="excelCol" data-field="이름">이름</th>
					<th scope="col" name="excelCol" data-field="부서명">부서명</th>
				</tr>
				</thead>
				<!-- <tbody>
					<tr>
						<td colspan="4">
							<div class="no-data">
								데이터가 없습니다.
							</div>
						</td>
					</tr>
				</tbody> -->
				<tbody>
					<tr>
						<td data-field="방문일">2025-06-12</td>
						<td data-field="사번">12345678</td>
						<td data-field="이름">홍길동</td>
						<td data-field="부서명">설계기획부</td>
					</tr>
				</tbody>
			</table>
		</div>
		<script src="/resources/js/duplicateByElement.js"></script>
		<script>
			const targetRow = document.querySelector('.table[aria-label="방문자정보"] tbody:has([data-field])');
			duplicateByElement(targetRow, 10);
		</script>
	</div>
