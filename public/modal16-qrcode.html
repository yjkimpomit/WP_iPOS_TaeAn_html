						<option value="발전부">발전부</option>
						<option value=""></option>
					</select>
				</div>
				
				<div class="col-md-6 col-lg-4 col-xxl-2 col-xxxl-2 mb-3">

					<select class="form-select" id="handoverDate" name="handoverDate">

				</div>

						<option value="">#10 TO</option>
						<option value=""></option>
					</select>
				</div>
				
				<div class="col-md-6 col-lg-4 col-xxl-2 col-xxxl-2 mb-3">
					<label class="form-label" for="inspectionFacilityId">점검설비</label>
					<select class="form-select" id="inspectionFacilityId" name="inspectionFacilityId">
						<option value="" selected>----------------------------------</option>
						<option value="">전체</option>
						<option value=""></option>
					</select>
				</div>

					<span class="form-label" id="operator">근무자</span>
					<div class="row g-4" aria-labelledby="operator">
						<label class="col-sm-3 col-md-1 col-form-label" for="operatorNS">NS</label>

							<input class="form-control" type="text" value="" id="operatorNS" name="operatedByNS">
