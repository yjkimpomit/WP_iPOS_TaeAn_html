<!-- 달력 -->
<script>
	$.ajax({
		method: 'GET',
		url: '/modal11-earlywarning-list.html',
		async: false,
		dataType: 'html'
	}).done(function(html) {
		$('#_ALARM_LIST').append(html);
	});
	
    function fnSearchList() {
		$.ajax({
			type: "GET"
			//, url: "/earlywarning/list.do"
			//, data: $("#searchForm").serialize()
			, url: "./modal11-earlywarning-list.html"
			, dataType: "html"
			, beforeSend: function () {
				$("#loadingBar").css("display", "");
			}
			, success: function (data) {
				$("#_ALARM_LIST").html(data);
			}
			, error: function () {
				alert("에러가 발생했습니다.\n잠시 후 다시 시도해 주시기 바랍니다.");
			}
			, complete: function () {
				$("#loadingBar").css("display", "none");
			}
		});
    }
	/* 검색 일수 정보 */
	function SelectedDaysCount(start, end) {
		var cur = start.clone().startOf('day');
		var last = end.clone().startOf('day');

		$("#searchForm #daysCount").val(last.diff(cur, 'days') + 1); // 선택 포함 일수
	}

	$(function () {
		function setToday() {
			var picker = $('#startDate').data('daterangepicker');
			var start = moment().startOf('day');
			var end = moment().endOf('day');

			picker.setStartDate(start);
			picker.setEndDate(end);

			// set date range picker value
			$('#startDate').val(start.format('YYYY-MM-DD HH:mm'));
			$('#endDate').val(end.format('YYYY-MM-DD HH:mm'));
		}

		$('#startDate').daterangepicker({
			timePicker: true,
			timePicker24Hour: true,
			ranges: {
				'Today': [moment(), moment()],
				'Yesterday': [moment().subtract(1, 'days'), moment().subtract(1, 'days')],
				'Last 7 Days': [moment().subtract(6, 'days'), moment()],
				'Last 30 Days': [moment().subtract(29, 'days'), moment()],
				'This Month': [moment().startOf('month'), moment().endOf('month')],
				'Last Month': [moment().subtract(1, 'month').startOf('month'), moment().subtract(1, 'month').endOf('month')]
			},
			alwaysShowCalendars: true,
			linkedCalendars: false,
			autoUpdateInput: false,
			showCustomRangeLabel: false,
			startDate: moment(),
			endDate: moment(),
			locale: {
				format: 'YYYY-MM-DD',
				separator: ' ~ ',
				applyLabel: '적용',
				cancelLabel: '닫기',
				fromLabel: '시작',
				toLabel: '종료',
				customRangeLabel: 'Custom',
				weekLabel: '주',
				daysOfWeek: ['일', '월', '화', '수', '목', '금', '토'],
				monthNames: ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월'],
				firstDay: 0
			}
		}, function (start, end, label) {
			SelectedDaysCount(start, end);

			$("#startDate").val(start.format('YYYY-MM-DD HH:mm'));
			$("#endDate").val(end.format('YYYY-MM-DD HH:mm'));

			fnSearchList();
		});

		/* load list page */
		setToday();
		//fnSearchList();

		$("#searchToday").click(function () {
			//fnSetParamValues('', '', '');
			setToday();
			//fnSearchList();
		});
	});
</script>
